name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: "Why re-run (e.g. after fixing workflow or adding secrets)"
        required: false
        default: "manual"
      tag:
        description: "Release tag (e.g. v2.0.3); required for mirrors/OIDC publish when not a release event"
        required: false
        default: ""

concurrency:
  group: release-${{ inputs.tag || github.event.release.tag_name || github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write
  # pub.dev job dispatches publish-pub.yml via gh workflow run
  actions: write

jobs:
  # --- Ecosystem mirrors (PHP, Swift) ---

  ecosystem-mirror-php:
    name: Ecosystem mirror (php)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror php/ → wildling-php
        continue-on-error: true
        env:
          PHP_MIRROR_TOKEN: ${{ secrets.PHP_MIRROR_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          if [ -z "$PHP_MIRROR_TOKEN" ] || [ -z "$TAG" ]; then
            echo "Skip: set PHP_MIRROR_TOKEN secret and tag (release or workflow input)"
            exit 0
          fi
          chmod +x scripts/mirror-php-packagist.sh
          ./scripts/mirror-php-packagist.sh "$TAG"

  ecosystem-mirror-swift:
    name: Ecosystem mirror (swift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Mirror swift/ → wildling-swift
        continue-on-error: true
        env:
          SWIFT_MIRROR_TOKEN: ${{ secrets.SWIFT_MIRROR_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          if [ -z "$SWIFT_MIRROR_TOKEN" ] || [ -z "$TAG" ]; then
            echo "Skip: set SWIFT_MIRROR_TOKEN secret and tag"
            exit 0
          fi
          chmod +x scripts/mirror-swift-spm.sh
          ./scripts/mirror-swift-spm.sh "$TAG"

  npm:
    name: npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest
      - name: Publish to npm
        working-directory: javascript
        run: |
          npm ci --include=dev
          npm run build
          cp ../docs/help.txt dist/help.txt
          npm publish --access public --provenance

  # --- Wave 2: OIDC trusted publishing (artifact registries; no extra git repos) ---

  pypi:
    name: PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build
        working-directory: python
        run: |
          python -m pip install --upgrade build
          cp ../docs/help.txt wildling/help.txt
          python -m build
          ls -la dist
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        continue-on-error: true
        with:
          packages-dir: python/dist

  crates:
    name: crates.io
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Authenticate to crates.io (OIDC)
        id: crates-auth
        continue-on-error: true
        uses: rust-lang/crates-io-auth-action@v1
      - name: Publish
        if: steps.crates-auth.outcome == 'success'
        run: |
          cp ../docs/help.txt help.txt 2>/dev/null || true
          set +e
          out="$(cargo publish --allow-dirty 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already exists( on crates\.io)?'; then
            echo "Version already on crates.io; skipping"
            exit 0
          fi
          exit "$status"
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.crates-auth.outputs.token }}

  nuget:
    name: NuGet (C#)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: csharp
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        run: |
          cp ../docs/help.txt help.txt
          dotnet pack -c Release -o ./nupkg
      - name: NuGet login
        id: login
        continue-on-error: true
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push
        if: steps.login.outcome == 'success'
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  rubygems:
    name: RubyGems
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    defaults:
      run:
        working-directory: ruby
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Build gem
        run: |
          cp ../docs/help.txt help.txt
          gem build wildling.gemspec
      - name: Configure credentials
        id: rubygems-auth
        continue-on-error: true
        uses: rubygems/configure-rubygems-credentials@main
      - name: Push gem
        if: steps.rubygems-auth.outcome == 'success'
        run: |
          set +e
          out="$(gem push wildling-*.gem 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|been pushed)|Repushing of gem versions is not allowed'; then
            echo "Version already on RubyGems; skipping"
            exit 0
          fi
          exit "$status"

  pubdev:
    name: pub.dev
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Trigger Publish pub.dev
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.event.release.tag_name || github.ref_name }}
        run: |
          if [ -z "$TAG" ]; then
            echo "No tag to publish" >&2
            exit 1
          fi
          # pub.dev OIDC requires ref_type=tag. Dispatch on the tag ref (not main),
          # otherwise publish fails with "only allowed from a 'tag' refType".
          gh workflow run publish-pub.yml --repo "$GITHUB_REPOSITORY" --ref "$TAG"
          echo "Triggered Publish pub.dev on ref $TAG"

  nuget-vb:
    name: NuGet (VB)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        working-directory: visualbasic
        run: |
          cp ../docs/help.txt help.txt
          dotnet pack -c Release -o ./nupkg
      - name: NuGet login
        id: login
        continue-on-error: true
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push
        if: steps.login.outcome == 'success'
        working-directory: visualbasic
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  nuget-fs:
    name: NuGet (F#)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - name: Pack
        working-directory: fsharp
        run: |
          cp ../docs/help.txt help.txt
          dotnet pack -c Release -o ./nupkg
      - name: NuGet login
        id: login
        continue-on-error: true
        uses: NuGet/login@v1
        with:
          user: ${{ vars.NUGET_USER }}
      - name: Push
        if: steps.login.outcome == 'success'
        working-directory: fsharp
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key "${{ steps.login.outputs.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # --- Wave 3: Hex / LuaRocks / PowerShell Gallery ---

  hex:
    name: Hex.pm
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: elixir
    steps:
      - uses: actions/checkout@v4
      - uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.16"
          otp-version: "26"
      - name: Publish
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
        run: |
          if [ -z "${HEX_API_KEY}" ]; then
            echo "HEX_API_KEY secret not set; skipping Hex.pm publish"
            exit 0
          fi
          mix local.hex --force
          cp ../docs/help.txt lib/wildling/help.txt
          set +e
          out="$(mix hex.publish package --yes 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|published)|Package already exists|Version .+ already exists|must include the --replace flag'; then
            echo "Version already on Hex.pm; skipping"
            exit 0
          fi
          exit "$status"

  luarocks:
    name: LuaRocks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lua
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Publish
        env:
          LUAROCKS_API_KEY: ${{ secrets.LUAROCKS_API_KEY }}
        run: |
          if [ -z "${LUAROCKS_API_KEY}" ]; then
            echo "LUAROCKS_API_KEY secret not set; skipping LuaRocks publish"
            exit 0
          fi
          sudo apt-get update -qq
          sudo apt-get install -y -qq luarocks
          # luarocks upload needs a JSON library (API responses).
          sudo luarocks install dkjson
          cp ../docs/help.txt lib/wildling/help.txt
          VERSION="$(tr -d '[:space:]' < ../VERSION)"
          rockspec="wildling-${VERSION}-1.rockspec"
          if [ ! -f "$rockspec" ]; then
            echo "Missing $rockspec" >&2
            exit 1
          fi
          set +e
          out="$(luarocks upload "$rockspec" --api-key="$LUAROCKS_API_KEY" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|uploaded)|File already exists|module .+ already exists|version already exists'; then
            echo "Version already on LuaRocks; skipping"
            exit 0
          fi
          exit "$status"

  psgallery:
    name: PowerShell Gallery
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:PSGALLERY_API_KEY)) {
            Write-Host "PSGALLERY_API_KEY secret not set; skipping PowerShell Gallery publish"
            exit 0
          }
          Copy-Item ./docs/help.txt ./powershell/help.txt -Force
          # Gallery expects the folder name to match the module name.
          $stage = Join-Path $env:RUNNER_TEMP "Wildling"
          if (Test-Path $stage) { Remove-Item $stage -Recurse -Force }
          Copy-Item ./powershell $stage -Recurse
          try {
            Publish-Module -Path $stage -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Force -ErrorAction Stop
          } catch {
            $msg = $_.Exception.Message + "`n" + $_.ToString()
            Write-Host $msg
            if ($msg -match '(?i)already (exists|available)|cannot be published|cannot be overwritten|409|conflict') {
              Write-Host "Version already on PowerShell Gallery; skipping"
              exit 0
            }
            throw
          }

  # --- Wave 4: Maven Central (Java first) ---

  maven-central:
    name: Maven Central (Java)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: java
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${CENTRAL_USERNAME}" ] || [ -z "${CENTRAL_PASSWORD}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "CENTRAL_USERNAME / CENTRAL_PASSWORD / GPG_PASSPHRASE not set; skipping Maven Central"
            exit 0
          fi
          if ! gpg --batch --list-secret-keys 2>/dev/null | grep -q sec; then
            echo "GPG_PRIVATE_KEY not imported; skipping Maven Central"
            exit 0
          fi
          cp ../docs/help.txt help.txt
          set +e
          out="$(mvn -B -DskipTests deploy -Pcentral 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|published)|Deployment .* already exists|409 Conflict|component .* already exists'; then
            echo "Version already on Maven Central; skipping"
            exit 0
          fi
          exit "$status"

  maven-central-kotlin:
    name: Maven Central (Kotlin)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${CENTRAL_USERNAME}" ] || [ -z "${CENTRAL_PASSWORD}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "CENTRAL_USERNAME / CENTRAL_PASSWORD / GPG_PASSPHRASE not set; skipping Maven Central"
            exit 0
          fi
          if ! gpg --batch --list-secret-keys 2>/dev/null | grep -q sec; then
            echo "GPG_PRIVATE_KEY not imported; skipping Maven Central"
            exit 0
          fi
          cp ../docs/help.txt help.txt
          set +e
          out="$(mvn -B -DskipTests deploy -Pcentral 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|published)|Deployment .* already exists|409 Conflict|component .* already exists'; then
            echo "Version already on Maven Central; skipping"
            exit 0
          fi
          exit "$status"

  maven-central-scala:
    name: Maven Central (Scala)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: scala
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${CENTRAL_USERNAME}" ] || [ -z "${CENTRAL_PASSWORD}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "CENTRAL_USERNAME / CENTRAL_PASSWORD / GPG_PASSPHRASE not set; skipping Maven Central"
            exit 0
          fi
          if ! gpg --batch --list-secret-keys 2>/dev/null | grep -q sec; then
            echo "GPG_PRIVATE_KEY not imported; skipping Maven Central"
            exit 0
          fi
          cp ../docs/help.txt help.txt
          set +e
          out="$(mvn -B -DskipTests deploy -Pcentral 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|published)|Deployment .* already exists|409 Conflict|component .* already exists'; then
            echo "Version already on Maven Central; skipping"
            exit 0
          fi
          exit "$status"

  maven-central-groovy:
    name: Maven Central (Groovy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: groovy
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          server-id: central
          server-username: CENTRAL_USERNAME
          server-password: CENTRAL_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE
      - name: Publish
        env:
          CENTRAL_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          CENTRAL_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "${CENTRAL_USERNAME}" ] || [ -z "${CENTRAL_PASSWORD}" ] || [ -z "${GPG_PASSPHRASE}" ]; then
            echo "CENTRAL_USERNAME / CENTRAL_PASSWORD / GPG_PASSPHRASE not set; skipping Maven Central"
            exit 0
          fi
          if ! gpg --batch --list-secret-keys 2>/dev/null | grep -q sec; then
            echo "GPG_PRIVATE_KEY not imported; skipping Maven Central"
            exit 0
          fi
          cp ../docs/help.txt help.txt
          set +e
          out="$(mvn -B -DskipTests deploy -Pcentral 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|published)|Deployment .* already exists|409 Conflict|component .* already exists'; then
            echo "Version already on Maven Central; skipping"
            exit 0
          fi
          exit "$status"

  runiverse:
    name: R-universe
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: r
    steps:
      - uses: actions/checkout@v4
      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true
      - name: Build package and ensure universe registry
        env:
          RUNIVERSE_TOKEN: ${{ secrets.RUNIVERSE_TOKEN }}
          RUNIVERSE_OWNER: ${{ vars.RUNIVERSE_OWNER }}
          RUNIVERSE_REPO: ${{ vars.RUNIVERSE_REPO }}
        run: |
          mkdir -p inst
          cp ../docs/help.txt inst/help.txt
          cp ../LICENSE LICENSE
          R CMD build .
          tarball="$(ls -1 wildling_*.tar.gz | head -n 1)"
          if [ -z "$tarball" ]; then
            echo "R CMD build failed to produce wildling_*.tar.gz" >&2
            exit 1
          fi
          echo "Built $tarball"
          owner="${RUNIVERSE_OWNER:-dotmonk}"
          repo="${RUNIVERSE_REPO:-${owner}/${owner}.r-universe.dev}"
          if [ -z "${RUNIVERSE_TOKEN}" ]; then
            echo "RUNIVERSE_TOKEN not set; package built but universe registry not updated"
            echo "One-time: install the R-universe GitHub App and add to ${repo} packages.json:"
            echo '  {"package":"wildling","url":"https://github.com/dotmonk/wildling","subdir":"r"}'
            exit 0
          fi
          export GH_TOKEN="$RUNIVERSE_TOKEN"
          tmp="$(mktemp)"
          if gh api "repos/${repo}/contents/packages.json" --jq .content 2>/dev/null | base64 -d >"$tmp" 2>/dev/null; then
            :
          else
            echo '[]' >"$tmp"
          fi
          python3 - "$tmp" <<'PY'
          import json, sys
          path = sys.argv[1]
          with open(path) as f:
              data = json.load(f)
          if not isinstance(data, list):
              data = []
          entry = {
              "package": "wildling",
              "url": "https://github.com/dotmonk/wildling",
              "subdir": "r",
          }
          found = False
          for i, item in enumerate(data):
              if isinstance(item, dict) and item.get("package") == "wildling":
                  data[i] = entry
                  found = True
                  break
          if not found:
              data.append(entry)
          with open(path, "w") as f:
              json.dump(data, f, indent=2)
              f.write("\n")
          print("registry entries:", len(data))
          PY
          sha="$(gh api "repos/${repo}/contents/packages.json" --jq .sha 2>/dev/null || true)"
          args=(-X PUT "repos/${repo}/contents/packages.json"
            -f message="Register wildling for R-universe"
            -f content="$(base64 -w0 "$tmp")")
          if [ -n "$sha" ]; then
            args+=(-f sha="$sha")
          fi
          set +e
          out="$(gh api "${args[@]}" 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already exists|Not Found'; then
            echo "Universe registry update skipped or repo missing; package tarball is ready"
            exit 0
          fi
          exit "$status"

  github-release-native:
    name: GitHub Release (C/C++)
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Package and upload C/C++ assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          if [ -z "$TAG" ]; then
            echo "No release tag; skipping C/C++ GitHub Release assets"
            exit 0
          fi
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG not found yet; skipping"
            exit 0
          fi
          chmod +x scripts/package-c-cpp-release.sh
          VERSION="${TAG#v}"
          ./scripts/package-c-cpp-release.sh "$VERSION"
          gh release upload "$TAG" dist/release/*.tar.gz --clobber
          ls -la dist/release/
