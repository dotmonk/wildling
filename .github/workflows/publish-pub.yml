# Publish the Dart package under dart/ to pub.dev via OIDC.
# Tag pattern on pub.dev must be: v{{version}}
#
# First-time: publish once manually (`cd dart && dart pub publish`), then enable
# "publishing from GitHub Actions" on the package Admin tab (repo + tag pattern).
#
# pub.dev only accepts OIDC when the workflow run's ref_type is tag. Trigger via:
#   - push of tag vX.Y.Z, or
#   - `gh workflow run publish-pub.yml --ref vX.Y.Z` (must use --ref, not main)
name: Publish pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: pub.dev
    runs-on: ubuntu-latest
    steps:
      - name: Require tag ref (pub.dev OIDC)
        # Must not use working-directory: dart — that path does not exist until checkout.
        run: |
          echo "ref=${GITHUB_REF} ref_type=${GITHUB_REF_TYPE} ref_name=${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            echo "::error::pub.dev OIDC requires a tag ref. Re-run with: gh workflow run publish-pub.yml --ref vX.Y.Z"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Prepare
        working-directory: dart
        run: |
          cp ../docs/help.txt help.txt 2>/dev/null || true
          dart pub get

      - name: Verify pubspec version matches tag
        working-directory: dart
        run: |
          PUBSPEC_VERSION="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | tr -d '[:space:]')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PUBSPEC_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::pubspec version ($PUBSPEC_VERSION) does not match tag ($GITHUB_REF_NAME)"
            exit 1
          fi

      - name: Publish
        working-directory: dart
        run: |
          set +e
          out="$(dart pub publish --force 2>&1)"
          status=$?
          set -e
          printf '%s\n' "$out"
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          if printf '%s\n' "$out" | grep -Eqi 'already (exists|been published)|Version .+ of .+ already exists'; then
            echo "Version already on pub.dev; skipping"
            exit 0
          fi
          exit "$status"
